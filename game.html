<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Game · Xiao Zhan Studio Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    /* ---------- Theme variables (keep in sync with index.html) ---------- */
    :root {
      --bg-base:  #150205; --bg-base-2: #200407;
      --bg-dark:  #300810; --bg-mid:    #420d18;
      --bg-float: #380a14;
      --gold:     #A07800;
      --gold-rgb: 220, 170, 20; --gold-dr: 160, 120, 0;
      --red-rgb:  196, 18, 48;  --shad-rgb: 48, 8, 16;
      --grad-gold:   linear-gradient(135deg, #E8C040 0%, #B89010 50%, #DDB820 100%);
      --grad-gold-h: linear-gradient(135deg, #D4A820 0%, #8A6800 50%, #C0980C 100%);
      --grad-red:    linear-gradient(135deg, #3a0910 0%, #500f1c 100%);
      --surface:   rgba(253,245,240,0.98); --surface-0: #fdf5f0;
      --surface-w: #ede7d6; --surface-m: #f8f4eb; --surface-d: #f0ead8;
      --border: #d8ccb8;
    }
    [data-theme="sapphire"] {
      --bg-base:#020610;--bg-base-2:#040c1e;--bg-dark:#081535;--bg-mid:#0d1f4a;--bg-float:#060e2a;
      --red-rgb:30,70,180;--shad-rgb:8,16,48;
      --grad-red:linear-gradient(135deg,#081535 0%,#0d1f4a 100%);
      --surface:rgba(240,244,255,0.98);--surface-0:#f0f4ff;--surface-w:#e0e8f8;--surface-m:#e8eef8;--surface-d:#dce5f5;--border:#c8d0e8;
    }
    [data-theme="violet"] {
      --bg-base:#0d0418;--bg-base-2:#160622;--bg-dark:#2a0840;--bg-mid:#380b55;--bg-float:#200630;
      --red-rgb:100,20,180;--shad-rgb:20,5,40;
      --grad-red:linear-gradient(135deg,#2a0840 0%,#380b55 100%);
      --surface:rgba(248,242,255,0.98);--surface-0:#f8f2ff;--surface-w:#ede0f8;--surface-m:#f2ebfc;--surface-d:#ece0f5;--border:#d0c0e8;
    }
    [data-theme="sakura"] {
      --bg-base:#0E0608;--bg-base-2:#160A0C;--bg-dark:#2A1018;--bg-mid:#1E0C14;--bg-float:#0A0406;
      --gold:#D07090;--gold-rgb:244,130,165;--gold-dr:180,70,100;
      --grad-gold:linear-gradient(135deg,#F090A8 0%,#C06070 50%,#E07898 100%);
      --grad-gold-h:linear-gradient(135deg,#D07090 0%,#A04060 50%,#C05878 100%);
      --red-rgb:245,140,160;--shad-rgb:28,8,14;
      --grad-red:linear-gradient(135deg,#2A1018 0%,#1E0C14 100%);
      --surface:rgba(255,244,246,0.98);--surface-0:#fff4f6;--surface-w:#fce8ec;--surface-m:#fdf0f2;--surface-d:#f8e4e8;--border:#e8c8d0;
    }
    [data-theme="lunar"] {
      --bg-base:#050810;--bg-base-2:#080D1C;--bg-dark:#0C1428;--bg-mid:#101C38;--bg-float:#040610;
      --gold:#9ABCEE;--gold-rgb:180,210,255;--gold-dr:100,150,210;
      --grad-gold:linear-gradient(135deg,#A8C8F8 0%,#6888C8 50%,#98B8E8 100%);
      --grad-gold-h:linear-gradient(135deg,#90AADE 0%,#5070B0 50%,#8098D0 100%);
      --red-rgb:190,215,255;--shad-rgb:8,12,28;
      --grad-red:linear-gradient(135deg,#0C1428 0%,#101C38 100%);
      --surface:rgba(240,243,255,0.98);--surface-0:#f0f3ff;--surface-w:#e4e8f8;--surface-m:#e8ecfc;--surface-d:#dce2f5;--border:#c8d0e8;
    }
    [data-theme="washi-garnet"] {
      --bg-base:#EAEAEC;--bg-base-2:#E3E3E5;--bg-dark:#4A1018;--bg-mid:#3C0C14;--bg-float:#5A1420;
      --gold:#6A1828;--gold-rgb:160,40,60;--gold-dr:100,24,40;
      --grad-gold:linear-gradient(135deg,#8A2030 0%,#5A1020 50%,#7A1C2C 100%);
      --grad-gold-h:linear-gradient(135deg,#7A1C2C 0%,#4A0C18 50%,#6A1828 100%);
      --red-rgb:140,30,50;--shad-rgb:60,12,20;
      --grad-red:linear-gradient(135deg,#EAEAEC 0%,#E3E3E5 100%);
      --surface:rgba(250,248,245,0.98);--surface-0:#faf8f5;--surface-w:#f0ece4;--surface-m:#f5f1e8;--surface-d:#ede8dc;--border:#ccc4b4;
    }
    [data-theme="washi-slate"] {
      --bg-base:#ECEDF1;--bg-base-2:#E5E6EA;--bg-dark:#2A3448;--bg-mid:#1E2838;--bg-float:#3A4860;
      --gold:#3A4860;--gold-rgb:80,100,140;--gold-dr:50,70,100;
      --grad-gold:linear-gradient(135deg,#4A5870 0%,#2A3448 50%,#404E68 100%);
      --grad-gold-h:linear-gradient(135deg,#404E68 0%,#1E2838 50%,#384860 100%);
      --red-rgb:60,80,120;--shad-rgb:30,40,60;
      --grad-red:linear-gradient(135deg,#ECEDF1 0%,#E5E6EA 100%);
      --surface:rgba(248,249,252,0.98);--surface-0:#f8f9fc;--surface-w:#eceef4;--surface-m:#f0f2f8;--surface-d:#e8eaf2;--border:#c8ccd8;
    }

    /* ---------- Base styles ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--surface-0);
      min-height: 100vh;
    }
    [data-theme="washi-garnet"] body,
    [data-theme="washi-slate"] body { color: var(--bg-dark); }

    a { color: inherit; text-decoration: none; }
    .hidden { display: none !important; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 22px; border-radius: 20px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn.primary { background: var(--grad-gold); color: white; }
    .btn.primary:hover { background: var(--grad-gold-h); transform: translateY(-1px); }

    /* ---------- Back bar ---------- */
    .back-bar {
      background: var(--bg-mid);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(var(--gold-rgb), 0.25);
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(var(--gold-rgb), 0.9); font-size: 13px; font-weight: 600;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid rgba(var(--gold-rgb), 0.35);
      transition: all 0.2s;
      white-space: nowrap; flex-shrink: 0;
    }
    .back-link:hover { background: rgba(var(--gold-rgb), 0.1); border-color: var(--gold); }
    [data-theme="washi-garnet"] .back-bar,
    [data-theme="washi-slate"] .back-bar { background: var(--surface-d); border-bottom-color: rgba(var(--gold-rgb),0.3); }
    [data-theme="washi-garnet"] .back-link,
    [data-theme="washi-slate"] .back-link { color: var(--bg-dark); border-color: rgba(var(--gold-rgb),0.5); }

    /* ---------- Header ---------- */
    header {
      text-align: center;
      padding: 28px 20px 20px;
      background: var(--grad-red);
    }
    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px; font-weight: 600; color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    header p { font-size: 12px; color: rgba(var(--gold-rgb), 0.75); margin-top: 6px; }
    [data-theme="washi-garnet"] header,
    [data-theme="washi-slate"] header { background: var(--surface-w); }
    [data-theme="washi-garnet"] header h1,
    [data-theme="washi-slate"] header h1 { color: var(--bg-dark); text-shadow: none; }

    /* ---------- Game container ---------- */
    .game-wrap {
      max-width: 560px; margin: 0 auto; padding: 24px 16px 40px;
      text-align: center;
    }

    /* Loading state */
    .loading-msg {
      color: rgba(var(--gold-rgb), 0.8); font-size: 14px;
      margin: 40px 0; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Score bar */
    .score-bar {
      display: flex; justify-content: center; gap: 10px;
      margin: 0 0 20px; flex-wrap: wrap;
    }
    .score-pill {
      background: var(--grad-gold); color: white;
      padding: 8px 18px; border-radius: 20px;
      font-size: 13px; font-weight: 700; min-width: 90px;
    }

    /* Photo */
    .game-photo {
      width: 100%; max-width: 440px; height: 280px;
      object-fit: contain;
      background: var(--surface-w);
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(var(--shad-rgb), 0.35);
      margin: 0 auto 20px; display: block;
    }

    /* Options grid */
    .options {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; max-width: 440px; margin: 0 auto 20px;
    }
    .option-btn {
      padding: 12px 8px;
      border: 2px solid var(--border);
      background: var(--surface-0);
      border-radius: 12px; cursor: pointer;
      font-size: 14px; font-weight: 700;
      color: var(--bg-dark); transition: all 0.2s;
      font-family: inherit;
    }
    .option-btn:hover:not(:disabled) {
      border-color: rgba(var(--gold-rgb), 0.6);
      background: var(--surface-m);
      transform: translateY(-2px);
    }
    .option-btn.correct { background: linear-gradient(45deg,#2ed573,#1dd1a1); color:white; border-color:#2ed573; }
    .option-btn.incorrect { background: linear-gradient(45deg,#ff4757,#ff3742); color:white; border-color:#ff4757; }
    .option-btn:disabled { cursor: default; }

    /* Result */
    .game-result {
      margin: 0 auto 20px; padding: 12px 20px;
      border-radius: 10px; font-weight: 700; font-size: 14px;
      max-width: 440px;
    }
    .game-result.correct { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
    .game-result.incorrect { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }

    /* Controls */
    .game-controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

    /* Hint box */
    .hint-box {
      background: var(--surface-w); border-left: 4px solid var(--gold);
      border-radius: 10px; padding: 14px 18px; margin: 0 auto 24px;
      max-width: 440px; text-align: left;
      font-size: 12px; color: var(--bg-dark); line-height: 1.5;
    }

    /* Theme switcher */
    .theme-row {
      display: flex; justify-content: center; align-items: center;
      gap: 6px; padding: 10px 16px; flex-wrap: wrap;
      background: rgba(0,0,0,0.15);
    }
    [data-theme="washi-garnet"] .theme-row,
    [data-theme="washi-slate"] .theme-row { background: var(--surface-d); }
    .theme-row span { font-size: 11px; color: rgba(var(--gold-rgb),0.7); margin-right: 2px; }
    .theme-dot {
      width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.tdot-active { border-color: white; box-shadow: 0 0 0 1px rgba(255,255,255,0.5); }
    [data-theme="washi-garnet"] .theme-dot.tdot-active,
    [data-theme="washi-slate"]  .theme-dot.tdot-active { border-color: var(--bg-dark); }

    @media (max-width: 480px) {
      header h1 { font-size: 22px; }
      .game-photo { height: 220px; }
      .back-bar { padding: 8px 12px; }
      .theme-row { padding: 6px 8px; gap: 5px; }
      .theme-dot { width: 16px; height: 16px; }
      .back-link { font-size: 12px; padding: 4px 9px; }
    }
  </style>
</head>
<body>

  <div class="back-bar">
    <a class="back-link" href="index.html" target="_blank" rel="noopener">← Gallery 图库</a>
    <div class="theme-row">
      <span>Style</span>
      <div class="theme-dot tdot-active" data-t="red"          title="China Red"          style="background:#8B0010"></div>
      <div class="theme-dot"             data-t="sakura"        title="Sakura Night"        style="background:#2A1018"></div>
      <div class="theme-dot"             data-t="sapphire"      title="Midnight Sapphire"   style="background:#1A3FAA"></div>
      <div class="theme-dot"             data-t="lunar"         title="Lunar"               style="background:#3A5890"></div>
      <div class="theme-dot"             data-t="violet"        title="Imperial Violet"     style="background:#5A0FA0"></div>
      <div class="theme-dot"             data-t="washi-garnet"  title="Washi · Garnet"
           style="background:linear-gradient(135deg,#EAEAEC 50%,#7A2030 50%)"></div>
      <div class="theme-dot"             data-t="washi-slate"   title="Washi · Slate"
           style="background:linear-gradient(135deg,#ECEDF1 50%,#3A4860 50%)"></div>
    </div>
  </div>

  <header>
    <h1>🎮 When Was This Posted?</h1>
    <p>猜猜这张照片是什么时候发布的？</p>
  </header>

  <div class="game-wrap">

    <p class="loading-msg" id="loadingMsg">Loading photo data... 加载中...</p>

    <div id="gameUI" class="hidden">

      <div class="hint-box" id="hintBox">
        <strong>💡 猜猜看：</strong>这张照片在什么时候发布？<br>
        Click "Start Game" to begin · 点击「开始游戏」测试你的眼力！
      </div>

      <div class="score-bar">
        <div class="score-pill">Score: <span id="score">0</span></div>
        <div class="score-pill">Streak: <span id="streak">0</span></div>
        <div class="score-pill">Total: <span id="total">0</span></div>
      </div>

      <img id="gamePhoto" class="game-photo" alt="Guess the date" />
      <video id="gameVideo" class="game-photo hidden" autoplay loop muted playsinline></video>

      <div id="gameOptions" class="options"></div>
      <div id="gameResult" class="game-result hidden"></div>

      <div class="game-controls">
        <button id="startBtn" class="btn primary">Start Game 开始游戏！</button>
        <button id="nextBtn"  class="btn primary hidden">Next Question 下一题</button>
        <button id="newBtn"   class="btn primary hidden">New Game 重新开始</button>
      </div>

    </div>
  </div>

  <script>
    /* ---------- Theme ---------- */
    const THEME_KEY = 'xzTheme';
    (function() {
      const saved = localStorage.getItem(THEME_KEY) || 'washi-slate';
      if (saved === 'red') document.documentElement.removeAttribute('data-theme');
      else document.documentElement.dataset.theme = saved;
      document.querySelectorAll('.theme-dot').forEach(d => {
        d.classList.toggle('tdot-active', d.dataset.t === saved);
        d.addEventListener('click', () => {
          const t = d.dataset.t;
          if (t === 'red') document.documentElement.removeAttribute('data-theme');
          else document.documentElement.dataset.theme = t;
          document.querySelectorAll('.theme-dot').forEach(x => x.classList.toggle('tdot-active', x.dataset.t === t));
          localStorage.setItem(THEME_KEY, t);
          if (!gameActive && photoData.length) showDefaultPhoto();
        });
      });
    })();

    /* ---------- Data loading ---------- */
    let photoData = [];
    const YEAR_FILES = [2026,2025,2024,2023,2022,2021,2020,2019];

    async function loadData() {
      const all = [];
      for (const yr of YEAR_FILES) {
        try {
          const res = await fetch(`${yr}.json?v=${Date.now()}`, { cache: 'no-store' });
          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data)) all.push(...data);
          }
        } catch(e) {}
      }
      photoData = all.filter(p => p.url && p.date);
      document.getElementById('loadingMsg').classList.add('hidden');
      if (photoData.length) {
        document.getElementById('gameUI').classList.remove('hidden');
        showDefaultPhoto();
      } else {
        document.getElementById('loadingMsg').textContent = 'No photo data found.';
        document.getElementById('loadingMsg').classList.remove('hidden');
      }
    }

    /* ---------- Thumbnail helper ---------- */
    function getThumb(url) {
      if (!url) return '';
      if (/youtube\.com\/watch|youtu\.be\//.test(url)) {
        const m = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
        return m ? `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg` : '';
      }
      if (url.includes('/full/')) {
        let t = url.replace('/full/', '/thumbs/');
        t = t.substring(0, t.lastIndexOf('.')) + '_m.jpg';
        try { return new URL(t).href; } catch(e) { return t; }
      }
      return url;
    }

    function isVideo(url) { return /\.(mp4|mov)$/i.test(url); }

    /* ---------- Default placeholder ---------- */
    function showDefaultPhoto() {
      const cs = getComputedStyle(document.documentElement);
      const c1 = (cs.getPropertyValue('--bg-mid') || '#420d18').trim();
      const c2 = (cs.getPropertyValue('--bg-dark') || '#300810').trim();
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><rect width="400" height="280" fill="url(#g)"/><text x="200" y="130" text-anchor="middle" font-family="Arial" font-size="42">🎮</text><text x="200" y="172" text-anchor="middle" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.7)">Press Start Game</text></svg>`;
      const img = document.getElementById('gamePhoto');
      img.src = 'data:image/svg+xml,' + encodeURIComponent(svg);
      img.classList.remove('hidden');
      document.getElementById('gameVideo').classList.add('hidden');
    }

    /* ---------- Game state ---------- */
    let gameActive = false, currentPhoto = null;
    let score = 0, streak = 0, total = 0;

    function startGame() {
      gameActive = true;
      document.getElementById('startBtn').classList.add('hidden');
      document.getElementById('newBtn').classList.remove('hidden');
      document.getElementById('hintBox').classList.add('hidden');
      score = streak = total = 0;
      updateStats();
      nextQuestion();
    }

    function nextQuestion() {
      document.getElementById('gameResult').classList.add('hidden');
      document.getElementById('nextBtn').classList.add('hidden');
      currentPhoto = photoData[Math.floor(Math.random() * photoData.length)];
      const img = document.getElementById('gamePhoto');
      const vid = document.getElementById('gameVideo');
      const url = currentPhoto.url;
      if (isVideo(url)) {
        vid.src = url; vid.classList.remove('hidden');
        img.classList.add('hidden');
      } else {
        img.src = getThumb(url); img.classList.remove('hidden');
        vid.classList.add('hidden'); vid.src = '';
      }
      renderOptions(makeOptions(currentPhoto));
    }

    function makeOptions(photo) {
      const correct = photo.date.substring(0, 7);
      const opts = new Set([correct]);
      let tries = 0;
      while (opts.size < 4 && tries < 200) {
        const r = photoData[Math.floor(Math.random() * photoData.length)];
        const d = r.date.substring(0, 7);
        if (d !== correct) opts.add(d);
        tries++;
      }
      return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    function renderOptions(options) {
      const c = document.getElementById('gameOptions');
      c.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => pick(opt);
        c.appendChild(btn);
      });
    }

    function pick(selected) {
      const correct = currentPhoto.date.substring(0, 7);
      total++;
      if (selected === correct) { score++; streak++; showResult('Correct! 正确！', 'correct'); }
      else { streak = 0; showResult(`Wrong! It was ${correct} · 答案是 ${correct}`, 'incorrect'); }
      updateStats();
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === correct) btn.classList.add('correct');
        else if (btn.textContent === selected) btn.classList.add('incorrect');
      });
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function showResult(msg, type) {
      const r = document.getElementById('gameResult');
      r.textContent = msg;
      r.className = `game-result ${type}`;
      r.classList.remove('hidden');
    }

    function updateStats() {
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      document.getElementById('total').textContent = total;
    }

    function newGame() {
      score = streak = total = 0;
      updateStats();
      nextQuestion();
    }

    /* ---------- Wire up buttons ---------- */
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    document.getElementById('newBtn').addEventListener('click', newGame);

    /* ---------- Start ---------- */
    loadData();
  </script>
</body>
</html>
